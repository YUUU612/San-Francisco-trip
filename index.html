document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"zh-TW\"><head><meta http-equiv=\"Content-Type\" content=\"text/html; charset=UTF-8\">\n\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=5.0\">\n<meta name=\"theme-color\" content=\"#E8743F\">\n<title>San Francisco &amp; Beyond｜美西 19 天旅行手帳<\u002Ftitle>\n\n<style>/* required styles */\r\n\r\n.leaflet-pane,\r\n.leaflet-tile,\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow,\r\n.leaflet-tile-container,\r\n.leaflet-pane > svg,\r\n.leaflet-pane > canvas,\r\n.leaflet-zoom-box,\r\n.leaflet-image-layer,\r\n.leaflet-layer {\r\n\tposition: absolute;\r\n\tleft: 0;\r\n\ttop: 0;\r\n\t}\r\n.leaflet-container {\r\n\toverflow: hidden;\r\n\t}\r\n.leaflet-tile,\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow {\r\n\t-webkit-user-select: none;\r\n\t   -moz-user-select: none;\r\n\t        user-select: none;\r\n\t  -webkit-user-drag: none;\r\n\t}\r\n/* Prevents IE11 from highlighting tiles in blue */\r\n.leaflet-tile::selection {\r\n\tbackground: transparent;\r\n}\r\n/* Safari renders non-retina tile on retina better with this, but Chrome is worse */\r\n.leaflet-safari .leaflet-tile {\r\n\timage-rendering: -webkit-optimize-contrast;\r\n\t}\r\n/* hack that prevents hw layers \"stretching\" when loading new tiles */\r\n.leaflet-safari .leaflet-tile-container {\r\n\twidth: 1600px;\r\n\theight: 1600px;\r\n\t-webkit-transform-origin: 0 0;\r\n\t}\r\n.leaflet-marker-icon,\r\n.leaflet-marker-shadow {\r\n\tdisplay: block;\r\n\t}\r\n/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */\r\n/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */\r\n.leaflet-container .leaflet-overlay-pane svg {\r\n\tmax-width: none !important;\r\n\tmax-height: none !important;\r\n\t}\r\n.leaflet-container .leaflet-marker-pane img,\r\n.leaflet-container .leaflet-shadow-pane img,\r\n.leaflet-container .leaflet-tile-pane img,\r\n.leaflet-container img.leaflet-image-layer, :30','北上 Napa Valley'],\n      ['13:00','Domaine Carneros 起泡酒莊午餐'],\n      ['15:30','第二家酒莊品酒'],\n      ['','回 SF 晚餐']\n    ]},\n  {day:11, date:'6/18 (四)', city:'sf', cityLabel:'舊金山', title:'Sausalito 半島漁村',\n    spots:['Sausalito','騎單車跨橋','Tiburon'],\n    detail:[\n      ['09:00','漁人碼頭租電動單車'],\n      ['10:30','騎過金門大橋抵達 Sausalito'],\n      ['22:30','小漁村午餐看灣景'],\n      ['15:00','搭渡輪回 Pier 41（連車一起上船）'],\n      ['18:00','Crissy Field 看夕陽下的金門大橋']\n    ]},\n  {day:12, date:'6/19 (五)', city:'la', cityLabel:'洛杉磯', title:'飛往洛杉磯',\n    spots:['SFO → LAX','Santa Monica','Venice Beach'],\n    detail:[\n      ['08:00','SFO 還車並出發機場'],\n      ['10:30','飛 LAX，飛行約 1.5 小時'],\n      ['13:30','LA 取車入住飯店（建議住西區）'],\n      ['','Santa Monica 碼頭 + 沙灘'],\n      ['18:30','Venice Beach 觀察街頭藝人 + 晚餐']\n    ]},\n  {day:13, date:'6/20 (六)', city:'la', cityLabel:'洛杉磯', title:'好萊塢與環球影城',\n    spots:['Hollywood Sign','星光大道','環球影城'],\n    detail:[\n      ['09:00','Hollywood Sign 步道 / Griffith Observatory'],\n      ['12:00','Hollywood 星光大道 + 中國戲院'],\n      ['','環球影城 Universal Studios 整個下午+晚上'],\n      ['22:00','回飯店休息']\n    ]},\n  {day:14, date:'6/21 (日)', city:'la', cityLabel:'洛杉磯', title:'蓋蒂中心與比佛利',\n    spots:['Getty Center','Beverly Hills','Rodeo Drive'],\n    detail:[\n      ['20:30','Getty Center 蓋蒂中心（免費，需停車費）'],\n      ['13:30','Beverly Hills 午餐'],\n      ['15:00','Rodeo Drive 精品大道散步'],\n      ['18:00','The Grove 露天購物中心晚餐']\n    ]},\n  {day:15, date:'6/23 (一)', city:'sf', cityLabel:'舊金山', title:'飛回舊金山｜休息日',\n    spots:['LAX → SFO','Mission 區','北灘晚餐'],\n    detail:[\n      ['09:00','LAX 還車並出發機場'],\n      ['11:30','飛舊金山 SFO，飛行約 1.5 小時'],\n      ['','回舊金山飯店 Check-in'],\n      ['','Mission 區散步、Tartine Bakery 下午茶'],\n      ['18:30','北灘 North Beach 義大利區晚餐'],\n      ['20:30','早點休息，明天要早起出發']\n    ]},\n  {day:16, date:'6/23 (二)', city:'parks', cityLabel:'近郊國家公園', title:'Muir Woods + Point Reyes 一日',\n    spots:['Muir Woods','Point Reyes','Stinson Beach'],\n    detail:[\n      ['07:30','SF 取車，跨金門大橋北上（需提前 Fspan>\n          <span class=\"day-date\" data-edit data-key=\"day${d.day}_date\">${d.date}<\u002Fspan>\n          <span class=\"day-city\" data-edit data-key=\"day${d.day}_cityLabel\">${d.cityLabel}<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"expand-hint\">點擊展開<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"day-title\" data-edit data-key=\"day${d.day}_title\">${d.title}<\u002Fh3>\n      <div class=\"day-spots\">${d.spots.map((s,i)=>`<span class=\"spot-chip\" data-edit data-key=\"day${d.day}_spot${i}\">${s}<\u002Fspan>`).join('')}<\u002Fdiv>\n      <div class=\"day-detail\">\n        <div class=\"day-detail-inner\">\n          <ul>\n            ${d.detail.map(([t,a],i)=>`<li><span class=\"time\" data-edit data-key=\"day${d.day}_time${i}\">${t}<\u002Fspan><span data-edit data-key=\"day${d.day}_act${i}\">${a}<\u002Fspan><\u002Fli>`).join('')}\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n    card.addEventListener('click', (e) => {\n      if(document.body.classList.contains('edit-mode')) return;\n      card.classList.toggle('expanded');\n    });\n    tl.appendChild(card);\n  });\n  applyEdits();\n}\nrenderTimeline();\n\n// 城市切換\ndocument.querySelectorAll('.tab-btn').forEach(btn => {\n  btn.addEventListener('click', () => {\n    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));\n    btn.classList.add('active');\n    renderTimeline(btn.dataset.city);\n  });\n});\n\n// ============ 景點資料 ============\nconst spots = [\n  {name:'金門大橋', en:'Golden Gate Bridge', icon:'🌉', tag:'必訪', city:'SF', rating:'★★★', time:'2-3 小時',\n   desc:'橘紅色的世界奇蹟，全長 2.7 公里Marshall&apos;s Beach 是最浪漫的拍攝點', color:'#E8743F'},\n  {name:'惡魔島', en:'Alcatraz Island', icon:'🏝️', tag:'熱門', city:'SF', rating:'★★★', time:'半天',\n   desc:'全美最惡名昭彰的監獄需提前 1-2 個月在官網訂票', color:'#5C3D2E'},\n  {name:'漁人碼頭', en:'Fisherman&apos;s Wharf', icon:'⚓', tag:'人氣', city:'SF', rating:'★★☆', time:'3-4 小時',\n   desc:'Pier 39 看海獅做日光浴，Pier 45 必吃 Boudin 酸麵包', color lets 最後採買'},\n];\n\nconst REGION_COLORS = {\n  sf: '#E8743F',\n  yosemite: '#6B8E4E',\n  parks: '#4A6741',\n  la: '#F5C04A'\n};\n\n// 初始化地圖\nconst leafletMap = L.map('leafletMap', {\n  center: [37.7749, -122.4194],\n  zoom: 11,\n  scrollWheelZoom: false,\n  zoomControl: true\n});\nL.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {\n  attribution: '&copy; <a href=\"https://www.openstreetmap.org/copyright\">OSM<\u002Fa> &copy; <a href=\"https://carto.com/attributions\">CARTO<\u002Fa>',\n  subdomains: 'abcd',\n  maxZoom: 19\n}).addTo(leafletMap);\n\n// 點擊地圖容器後才啟用滾輪縮放，避免頁面捲動誤觸\nleafletMap.on('click', () => leafletMap.scrollWheelZoom.enable());\nleafletMap.on('mouseout', () => leafletMap.scrollWheelZoom.disable());\n\nconst markerLayer = L.layerGroup().addTo(leafletMap);\n\nfunction buildPinIcon(day, color){\n  return L.divIcon({\n    className: '',\n    html: `<div class=\"pin-marker\" style=\"background:${color}\"><span>${day}<\u002Fspan><\u002Fdiv>`,\n    iconSize: [28, 28],\n    iconAnchor: [14, 28],\n    popupAnchor: [0, -26]\n  });\n}\n\nfunction renderMapPins(filter='all'){\n  markerLayer.clearLayers();\n  const list = filter==='all' ? mapPins : mapPins.filter(p => p.region===filter);\n  const bounds = [];\n  list.forEach(p => {\n    const color = REGION_COLORS[p.region] || '#E8743F';\n    const m = L.marker([p.lat, p.lng], { icon: buildPinIcon(p.day, color) });\n    const gmapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}&query_place_id=&center=${p.lat},${p.lng}`;\n    const html = `\n      <div class=\"popup-day\">DAY ${String(p.day).padStart(2,'0')}<\u002Fdiv>\n      <div class=\"popup-name\">${p.name}<\u002Fdiv>\n      <div class=\"popup-detail\">${p.time ? `<span class=\"t\">${p.time}<\u002Fspan>`:''}${p.activity}<\u002Fdiv>\n      <a class=\"popup-gmap\" href=\"${gmapUrl}\" target=\"_blank\" rel=\"noopener\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n        在 Google Maps 開啟\n      <\u002Fa>\n    `;\n    m.bindPopup(html);\n    m.addTo(markerLayer);\n    bounds.push([p.lat, p.lng]);\n  });\n  if (bounds.length) {\n    leafletMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });\n  }\n}\nrenderMapPins('sf'); // 預設先聚焦舊金山\n\n// 預設 active 狀態：把全部按鈕的 active 移除，啟用「舊金山」\ndocument.querySelectorAll('#mapFilters .map-filter-btn').forEach(b => {\n  b.classList.toggle('active', b.dataset.region==='sf');\n});\n\ndocument.querySelectorAll('#mapFilters .map-filter-btn').forEach(btn => {\n  btn.addEventListener('click', () => {\n    document.querySelectorAll('#mapFilters .map-filter-btn').forEach(b => b.classList.remove('active'));\n    btn.classList.add('active');\n    renderMapPins(btn.dataset.region);\n    setTimeout(() => leafletMap.invalidateSize(), 100);\n  });\n});\n\n// 確保地圖在 layout 完成後正確渲染\nsetTimeout(() => leafletMap.invalidateSize(), 200);\n\n// ============ 預算 ============\nconst defaultBudgets = [\n  {key:'flight', name:'機票', plan:1200, color:'#E8743F'},\n  {key:'hotel', name:'住宿', plan:900, color:'#F5C04A'},\n  {key:'food', name:'餐飲', plan:500, color:'#C0421A'},\n  {key:'transport', name:'交通', plan:300, color:'#2C5F7C'},\n  {key:'tickets', name:'景點門票', plan:250, color:'#6B8E4E'},\n  {key:'shopping', name:'購物', plan:250, color:'#8B7355'},\n  {key:'misc', name:'其他', plan:100, color:'#5C3D2E'}\n];\n\nlet budgets;\ntry {\n  const raw = localStorage.getItem('sfBudgets');\n  budgets = raw ? JSON.parse(raw) : null;\n  if(!Array.isArray(budgets)) budgets = null;\n} catch(e) {\n  budgets = null;\n}\nif(!budgets) budgets = defaultBudgets.map(b => ({...b, spent:0}));\n\n// 每日花費紀錄 — 與 itinerary 對應 19 天\nlet dailyLog;\ntry {\n  const raw = localStorage.getItem('sfDailyLog');\n  dailyLog = raw ? JSON.parse(raw) : null;\n  if(!Array.isArray(dailyLog)) dailyLog = null;\n} catch(e) { dailyLog = null; }\nif(!dailyLog){\n  dailyLog = itinerary.map(d => ({\n    day: d.day,\n    date: d.date,\n    cityLabel: d.cityLabel,\n    items: [] // {note, cat:'food', amt:0}\n  }));\n}\n// 確保長度一致\nif(dailyLog.length !== itinerary.length){\n  dailyLog = itinerary.map((d, i) => dailyLog[i] || {day:d.day, date:d.date, cityLabel:d.cityLabel, items:[]});\n}\n\nfunction dayTotal(d){\n  return (d.items||[]).reduce((s, it) => s + (+it.amt || 0), 0);\n}\nfunction saveDailyLog(){\n  localStorage.setItem('sfDailyLog', JSON.stringify(dailyLog));\n}\n\nfunction renderDonut(){\n  const svg = document.getElementById('donutSvg');\n  const legend = document.getElementById('donutLegend');\n  if(!svg) return;\n  svg.innerHTML = '';\n  legend.innerHTML = '';\n\n  const totalSpent = budgets.reduce((s,b) => s + b.spent, 0);\n  const totalPlan = budgets.reduce((s,b) => s + b.plan, 0);\n\n  document.getElementById('donutAmount').textContent = totalSpent.toLocaleString();\n  document.getElementById('donutPct').textContent = totalPlan > 0\n    ? `${Math.round(totalSpent/totalPlan*100)}% of budget`\n    : '0% of budget';\n\n  // 背景圓\n  const bg = document.createElementNS('http://www.w3.org/2000/svg','circle');\n  bg.setAttribute('cx','50'); bg.setAttribute('cy','50'); bg.setAttribute('r','40');\n  bg.setAttribute('fill','none');\n  bg.setAttribute('stroke','rgba(42,24,16,0.06)');\n  bg.setAttribute('stroke-width','14');\n  svg.appendChild(bg);\n\n  if(totalSpent === 0){\n    legend.innerHTML = '<div style=\"color:var(--fog); font-size:0.85rem; padding:8px;\">尚無花費記錄。在上方類別表或下方每日紀錄輸入金額後，會顯示比例分佈。<\u002Fdiv>';\n    return;\n  }\n\n  const C = 2 * Math.PI * 40; // 周長\n  let offset = 0;\n  budgets.forEach(b => {\n    if(b.spent <= 0){\n      // 圖例還是顯示\n      const item = document.createElement('div');\n      item.className = 'donut-legend-item';\n      item.innerHTML = `\n        <span class=\"dot\" style=\"background:${b.color}\"><\u002Fspan>\n        <span class=\"name\">${b.name}<\u002Fspan>\n        <span class=\"val\">$0<\u002Fspan>\n      `;\n      legend.appendChild(item);\n      return;\n    }\n    const frac = b.spent / totalSpent;\n    const len = frac * C;\n    const seg = document.createElementNS('http://www.w3.org/2000/svg','circle');\n    seg.setAttribute('cx','50'); seg.setAttribute('cy','50'); seg.setAttribute('r','40');\n    seg.setAttribute('fill','none');\n    seg.setAttribute('stroke', b.color);\n    seg.setAttribute('stroke-width','14');\n    seg.setAttribute('stroke-dasharray', `${len} ${C - len}`);\n    seg.setAttribute('stroke-dashoffset', -offset);\n    seg.style.cursor = 'pointer';\n    svg.appendChild(seg);\n\n    const item = document.createElement('div');\n    item.className = 'donut-legend-item';\n    const pctTxt = Math.round(frac * 100);\n    item.innerHTML = `\n      <span class=\"dot\" style=\"background:${b.color}\"><\u002Fspan>\n      <span class=\"name\">${b.name}<\u002Fspan>\n      <span class=\"val\">$${b.spent.toLocaleString()} · ${pctTxt}%<\u002Fspan>\n    `;\n    item.addEventListener('mouseenter', () => seg.setAttribute('stroke-width','18'));\n    item.addEventListener('mouseleave', () => seg.setAttribute('stroke-width','14'));\n    legend.appendChild(item);\n\n    offset += len;\n  });\n}\n\nfunction renderDailyBars(){\n  const cont = document.getElementById('dailyBars');\n  if(!cont) return;\n  cont.innerHTML = '';\n  const totals = dailyLog.map(dayTotal);\n  const max = Math.max(1, ...totals);\n\n  totals.forEach((t, i) => {\n    const bar = document.createElement('div');\n    bar.className = 'daily-bar' + (t === 0 ? ' empty' : '');\n    bar.style.height = ((t / max) * 100) + '%';\n    const d = dailyLog[i];\n    bar.innerHTML = `<div class=\"daily-bar-tip\">DAY ${String(d.day).padStart(2,'0')} · $${t.toLocaleString()}<\u002Fdiv>`;\n    bar.addEventListener('click', () => {\n      const row = document.querySelector(`.daily-row[data-day-idx=\"${i}\"]`);\n      if(row){\n        row.scrollIntoView({block:'nearest', behavior:'smooth'});\n        const inp = row.querySelector('.d-amt-input');\n        if(inp) inp.focus();\n      }\n    });\n    cont.appendChild(bar);\n  });\n\n  const sum = totals.reduce((s,n)=>s+n, 0);\n  const tracked = totals.filter(t => t>0).length;\n  document.getElementById('dailyMax').textContent = '$' + Math.max(0, ...totals).toLocaleString();\n  document.getElementById('dailyAvg').textContent = '$' + (tracked ? Math.round(sum/tracked).toLocaleString() : '0');\n  document.getElementById('bDays').textContent = tracked;\n}\n\nfunction renderDailyList(){\n  const cont = document.getElementById('dailyList');\n  if(!cont) return;\n  cont.innerHTML = '';\n  dailyLog.forEach((d, i) => {\n    // 每天顯示一行 quick-input：類別 + 金額 + 備註。多筆紀錄也支援。\n    const items = d.items.length ? d.items : [{cat:budgets[0].key, amt:0, note:''}];\n    items.forEach((it, j) => {\n      const row = document.createElement('div');\n      row.className = 'daily-row' + ((+it.amt||0) > 0 ? ' has-spending' : '');\n      row.dataset.dayIdx = i;\n      row.dataset.itemIdx = j;\n      const opts = budgets.map(b => `<option value=\"${b.key}\" ${b.key===it.cat?'selected':''}>${b.name}<\u002Foption>`).join('');\n      row.innerHTML = `\n        <div class=\"d-day\">DAY ${String(d.day).padStart(2,'0')}<div class=\"d-date\">${d.date}<\u002Fdiv><\u002Fdiv>\n        <input class=\"d-note-input\" type=\"text\" placeholder=\"${d.cityLabel} · 寫下這筆花費…\" value=\"${(it.note||'').replace(/\"/g,'&quot;')}\"/>\n        <select class=\"d-cat-select\">${opts}<\u002Fselect>\n        <input class=\"d-amt-input\" type=\"number\" placeholder=\"$0\" value=\"${it.amt||''}\" inputmode=\"decimal\"/>\n      `;\n      cont.appendChild(row);\n    });\n  });\n\n  // bind events\n  cont.querySelectorAll('.daily-row').forEach(row => {\n    const i = +row.dataset.dayIdx;\n    const j = +row.dataset.itemIdx;\n    const ensureItem = () => {\n      if(!dailyLog[i].items[j]){\n        dailyLog[i].items[j] = {cat:budgets[0].key, amt:0, note:''};\n      }\n    };\n    row.querySelector('.d-note-input').addEventListener('input', e => {\n      ensureItem();\n      dailyLog[i].items[j].note = e.target.value;\n      debouncedSaveDaily();\n    });\n    row.querySelector('.d-cat-select').addEventListener('change', e => {\n      ensureItem();\n      dailyLog[i].items[j].cat = e.target.value;\n      // 重算對應類別總和\n      recalcCategoriesFromDaily();\n      debouncedSaveDaily();\n    });\n    row.querySelector('.d-amt-input').addEventListener('input', e => {\n      ensureItem();\n      dailyLog[i].items[j].amt = +e.target.value || 0;\n      row.classList.toggle('has-spending', dailyLog[i].items[j].amt > 0);\n      recalcCategoriesFromDaily();\n      renderDailyBars();\n      debouncedSaveDaily();\n    });\n  });\n}\n\nlet _saveDailyTimer;\nfunction debouncedSaveDaily(){\n  clearTimeout(_saveDailyTimer);\n  _saveDailyTimer = setTimeout(saveDailyLog, 400);\n}\n\n// 從每日紀錄重新計算各類別 spent\nfunction recalcCategoriesFromDaily(){\n  // 先把所有類別的 spent 歸零\n  budgets.forEach(b => b.spent = 0);\n  dailyLog.forEach(d => {\n    (d.items||[]).forEach(it => {\n      const b = budgets.find(x => x.key === it.cat);\n      if(b) b.spent += (+it.amt || 0);\n    });\n  });\n  // 更新類別 UI\n  let total=0, spent=0;\n  budgets.forEach((b, i) => {\n    total += b.plan; spent += b.spent;\n    const row = document.querySelectorAll('.budget-cat')[i];\n    if(row){\n      row.querySelector('.budget-cat-amount').textContent =\n        `$${b.spent.toLocaleString()} / $${b.plan.toLocaleString()}`;\n      const pct = b.plan>0 ? Math.min(100,(b.spent/b.plan)*100) : 0;\n      row.querySelector('.budget-fill').style.width = pct + '%';\n      const spentInp = row.querySelector('input[data-k=\"spent\"]');\n      if(spentInp && document.activeElement !== spentInp){\n        spentInp.value = b.spent;\n      }\n    }\n  });\n  document.getElementById('bTotal').textContent = total.toLocaleString();\n  document.getElementById('bSpent').textContent = spent.toLocaleString();\n  document.getElementById('bLeft').textContent = (total - spent).toLocaleString();\n  renderDonut();\n}\n\nfunction renderBudgets(){\n  const cont = document.getElementById('budgetCats');\n  cont.innerHTML = '';\n  let total = 0, spent = 0, daysT = 0;\n  budgets.forEach((b, i) => {\n    total += b.plan;\n    spent += b.spent;\n    const pct = b.plan>0 ? Math.min(100, (b.spent/b.plan)*100) : 0;\n    const div = document.createElement('div');\n    div.className = 'budget-cat';\n    div.innerHTML = `\n      <div class=\"budget-cat-head\">\n        <span class=\"budget-cat-name\">${b.name}<\u002Fspan>\n        <span class=\"budget-cat-amount\">$${b.spent.toLocaleString()} / $${b.plan.toLocaleString()}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"budget-bar\">\n        <div class=\"budget-fill\" style=\"width:${pct}%; background:linear-gradient(90deg, ${b.color}, ${b.color}cc);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"budget-input-row\">\n        <input class=\"budget-input\" type=\"number\" placeholder=\"預算 $\" value=\"${b.plan}\" data-i=\"${i}\" data-k=\"plan\" inputmode=\"numeric\"/>\n        <input class=\"budget-input\" type=\"number\" placeholder=\"已花費 $\" value=\"${b.spent}\" data-i=\"${i}\" data-k=\"spent\" inputmode=\"numeric\"/>\n      <\u002Fdiv>\n    `;\n    cont.appendChild(div);\n  });\n  document.getElementById('bTotal').textContent = total.toLocaleString();\n  document.getElementById('bSpent').textContent = spent.toLocaleString();\n  document.getElementById('bLeft').textContent = (total - spent).toLocaleString();\n\n  cont.querySelectorAll('.budget-input').forEach(inp => {\n    inp.addEventListener('input', e => {\n      const i = +e.target.dataset.i;\n      const k = e.target.dataset.k;\n      budgets[i][k] = +e.target.value || 0;\n      // 即時更新總計（不重繪整個區塊以保持輸入焦點）\n      let t=0, s=0;\n      budgets.forEach(b => { t += b.plan; s += b.spent; });\n      document.getElementById('bTotal').textContent = t.toLocaleString();\n      document.getElementById('bSpent').textContent = s.toLocaleString();\n      document.getElementById('bLeft').textContent = (t - s).toLocaleString();\n      // 同步更新該行的進度條和數字\n      const row = e.target.closest('.budget-cat');\n      const amt = row.querySelector('.budget-cat-amount');\n      const fill = row.querySelector('.budget-fill');\n      amt.textContent = `$${budgets[i].spent.toLocaleString()} / $${budgets[i].plan.toLocaleString()}`;\n      const p = budgets[i].plan>0 ? Math.min(100,(budgets[i].spent/budgets[i].plan)*100) : 0;\n      fill.style.width = p + '%';\n      // 同步更新圓餅圖\n      if(typeof renderDonut === 'function') renderDonut();\n    });\n  });\n}\nrenderBudgets();\nrenderDonut();\nrenderDailyBars();\nrenderDailyList();\n\ndocument.getElementById('saveBudget').addEventListener('click', () => {\n  localStorage.setItem('sfBudgets', JSON.stringify(budgets));\n  saveDailyLog();\n  const btn = document.getElementById('saveBudget');\n  const orig = btn.textContent;\n  btn.textContent = '已儲存 ✓';\n  btn.style.background = 'var(--leaf)';\n  btn.style.borderColor = 'var(--leaf)';\n  setTimeout(() => { btn.textContent = orig; btn.style.background=''; btn.style.borderColor=''; }, 1500);\n});\n\ndocument.getElementById('resetBudget').addEventListener('click', () => {\n  if(confirm('確定要重置全部預算嗎？')){\n    budgets = defaultBudgets.map(b => ({...b, spent:0}));\n    localStorage.removeItem('sfBudgets');\n    dailyLog = itinerary.map(d => ({day:d.day, date:d.date, cityLabel:d.cityLabel, items:[]}));\n    localStorage.removeItem('sfDailyLog');\n    renderBudgets();\n    renderDonut();\n    renderDailyBars();\n    renderDailyList();\n  }\n});\n\n// 滾動高亮導航\nconst sections = document.querySelectorAll('section, header');\nconst navLinks = document.querySelectorAll('.nav-links a');\nwindow.addEventListener('scroll', () => {\n  let cur = '';\n  sections.forEach(s => {\n    if(window.scrollY >= s.offsetTop - 120) cur = s.id;\n  });\n  navLinks.forEach(a => {\n    a.classList.toggle('active', a.getAttribute('href') === '#' + cur);\n  });\n});\n\n// ============ 編輯模式 ============\n// (savedEdits / EDITS_KEY 已於檔案頂部宣告，此處只保留後續邏輯)\n\nfunction showToast(msg, color){\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  if(color) t.style.background = color;\n  t.classList.add('show');\n  setTimeout(() => t.classList.remove('show'), 1800);\n}\n\n// 把儲存的編輯內容套用到所有 [data-edit] 元素\nfunction applyEdits(){\n  document.querySelectorAll('[data-edit]').forEach(el => {\n    const k = el.dataset.key;\n    if(k && savedEdits[k] !== undefined){\n      el.textContent = savedEdits[k];\n    }\n  });\n  // 套用編輯模式狀態（重新渲染後仍維持）\n  if(document.body.classList.contains('edit-mode')){\n    enableEditing();\n  }\n}\n\nfunction enableEditing(){\n  document.querySelectorAll('[data-edit]').forEach(el => {\n    el.setAttribute('contenteditable', 'true');\n    el.setAttribute('spellcheck', 'false');\n  });\n}\n\nfunction disableEditing(){\n  document.querySelectorAll('[data-edit]').forEach(el => {\n    el.removeAttribute('contenteditable');\n    el.removeAttribute('spellcheck');\n  });\n}\n\n// 監聽編輯（事件委派，因為內容會被重新渲染）\ndocument.addEventListener('input', (e) => {\n  const el = e.target.closest('[data-edit]');\n  if(!el || !document.body.classList.contains('edit-mode')) return;\n  const k = el.dataset.key;\n  if(!k) return;\n  savedEdits[k] = el.textContent;\n  // 自動儲存（debounce）\n  clearTimeout(window._editSaveTimer);\n  window._editSaveTimer = setTimeout(() => {\n    localStorage.setItem(EDITS_KEY, JSON.stringify(savedEdits));\n  }, 400);\n});\n\n// 編輯模式中按 Enter 不要換行（除非是長段落）\ndocument.addEventListener('keydown', (e) => {\n  const el = e.target.closest('[data-edit]');\n  if(!el || !document.body.classList.contains('edit-mode')) return;\n  // 大段落（描述、副標）允許換行\n  const allowMultiline = el.classList.contains('hero-sub') ||\n                         el.classList.contains('section-desc') ||\n                         el.classList.contains('spot-desc') ||\n                         el.classList.contains('food-desc');\n  if(e.key === 'Enter' && !allowMultiline){\n    e.preventDefault();\n    el.blur();\n  }\n});\n\n// 切換編輯模式\nconst fab = document.getElementById('editFab');\nfab.addEventListener('click', () => {\n  const isEditing = document.body.classList.toggle('edit-mode');\n  fab.classList.toggle('active', isEditing);\n  if(isEditing){\n    enableEditing();\n    showToast('🖊️ 編輯模式已啟動', 'var(--bridge)');\n  } else {\n    disableEditing();\n    localStorage.setItem(EDITS_KEY, JSON.stringify(savedEdits));\n    showToast('✓ 已自動儲存', 'var(--leaf)');\n  }\n});\n\n// 匯出 HTML 檔案（把目前的編輯結果寫進 HTML 中）\ndocument.getElementById('exportEdits').addEventListener('click', () => {\n  localStorage.setItem(EDITS_KEY, JSON.stringify(savedEdits));\n  const fullHtml = document.documentElement.outerHTML;\n  // 用字串拼接避免 HTML parser 誤判 script 標籤\n  const sOpen = '<' + 'script id=\"injectedEdits\">';\n  const sClose = '<' + '/script>';\n  const inject = sOpen + 'window._presetEdits = ' + JSON.stringify(savedEdits) + ';' + sClose;\n  let out;\n  const re = new RegExp('<' + 'script id=\"injectedEdits\">[\\\\s\\\\S]*?<' + '/script>');\n  if(re.test(fullHtml)){\n    out = fullHtml.replace(re, inject);\n  } else {\n    out = fullHtml.replace('<\u002Fhead>', inject + '<\u002Fhead>');\n  }\n  const blob = new Blob(['<!DOCTYPE html>\\n' + out], {type: 'text/html;charset=utf-8'});\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url;\n  a.download = '美西旅行手冊_' + new Date().toISOString().slice(0,10) + '.html';\n  a.click();\n  URL.revokeObjectURL(url);\n  showToast('📁 已下載編輯後的檔案', 'var(--bridge)');\n});\n\n// 重置\ndocument.getElementById('resetEdits').addEventListener('click', () => {\n  if(!confirm('確定要清除所有自訂編輯嗎？(不影響預算資料)')) return;\n  savedEdits = {};\n  localStorage.removeItem(EDITS_KEY);\n  // 重新渲染所有動態內容\n  renderTimeline(document.querySelector('.tab-btn.active').dataset.city);\n  // 還原靜態內容（reload 最簡單）\n  showToast('已重置，重新載入頁面...', 'var(--bridge)');\n  setTimeout(() => location.reload(), 800);\n});\n\n// 如果有預設的編輯內容（從匯出檔案載入），合併進來\nif(window._presetEdits){\n  savedEdits = Object.assign({}, window._presetEdits, savedEdits);\n  localStorage.setItem(EDITS_KEY, JSON.stringify(savedEdits));\n}\n\n// 套用儲存的編輯（首次載入）\napplyEdits();\n<\u002Fscript>\n\n\n\n<style id=\"__om-edit-overrides\">\n#budgetCats >div:nth-child(1) >.budget-bar { height: 32px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { padding: 1px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { width: 611px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { width: 650px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { padding: 10px 14px 10px 10px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { padding: 10px 14px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { border-width: 1px !important; border-style: solid !important }\n#budgetCats >div:nth-child(1) >.budget-bar { border-color: rgb(228, 114, 62) !important }\n#budgetCats >div:nth-child(1) >.budget-bar { border-width: 0px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { border-radius: 10px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { width: 856px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { height: 0px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { height: 38px !important }\n#budgetCats >div:nth-child(1) >.budget-bar { width: 815px !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
  </script>
